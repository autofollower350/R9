<!DOCTYPE html>
<html>

<head>

<title>JNVU Admit Card Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:Arial;
    background:#eef2f3;
    text-align:center;
    padding-top:100px;
}

.card{

    background:white;

    width:90%;
    max-width:420px;

    margin:auto;

    padding:30px;

    border-radius:12px;

    box-shadow:0 0 15px rgba(0,0,0,.1);
}

input{

    width:90%;

    padding:12px;

    margin-top:15px;

    border:1px solid #ccc;

    border-radius:6px;

    font-size:16px;

    text-align:center;
}

button{

    width:95%;

    padding:12px;

    margin-top:15px;

    border:none;

    border-radius:6px;

    background:#ff4b4b;

    color:white;

    font-size:16px;

    cursor:pointer;
}

.footer{

    margin-top:20px;

    font-size:12px;

    color:#777;
}

</style>

</head>

<body>

<div class="card">

    <h2>
        🚩 RajasthaniBoyz Portal
    </h2>

    <p>
        Enter JNVU Form Number
    </p>

    <form
        action="/download"
        method="POST"
    >

        <input
            type="text"
            name="form_no"
            placeholder="Enter Form Number"
            required
        >

        <br>

        <button type="submit">
            🚀 Get Admit Card
        </button>

    </form>

    <div class="footer">
        Powered by Flask & Playwright
    </div>

</div>

</body>

</html>
