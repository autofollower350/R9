<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>JNVU Admit Card Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    background:#eef2f3;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

.card{

    width:100%;
    max-width:420px;

    background:#fff;

    padding:30px;

    border-radius:12px;

    box-shadow:0 4px 15px rgba(0,0,0,.1);

    text-align:center;
}

h2{
    color:#ff4b4b;
}

p{

    color:#666;

    margin-top:10px;

    margin-bottom:20px;
}

input{

    width:100%;

    padding:13px;

    border:1px solid #ccc;

    border-radius:6px;

    outline:none;

    font-size:16px;

    text-align:center;
}

button{

    width:100%;

    margin-top:15px;

    padding:13px;

    border:none;

    border-radius:6px;

    background:#ff4b4b;

    color:#fff;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;
}

button:active{
    transform:scale(.98);
}

.loader{

    margin-top:15px;

    color:#555;

    display:none;
}

.footer{

    margin-top:20px;

    font-size:12px;

    color:#777;
}

</style>

</head>

<body>

<div class="card">

    <h2>
        🚩 RajasthaniBoyz Portal
    </h2>

    <p>
        Enter JNVU Form Number
    </p>

    <form
        id="form"
        action="/download"
        method="POST"
    >

        <input
            type="text"
            name="form_no"
            placeholder="Enter Form Number"
            required
            autocomplete="off"
        >

        <button id="btn" type="submit">
            🚀 Download Admit Card
        </button>

    </form>

    <div class="loader" id="loader">
        ⏳ Processing...
    </div>

    <div class="footer">
        Powered by Flask & Playwright
    </div>

</div>

<script>

const form = document.getElementById('form');

const btn = document.getElementById('btn');

const loader = document.getElementById('loader');

form.addEventListener('submit', () => {

    btn.disabled = true;

    btn.innerHTML = 'Please Wait...';

    loader.style.display = 'block';
});

</script>

</body>
</html>
